<html>

    <head>
        <title>vfx</title>
        <meta charset="UTF-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    
    <body>
        <input type="button" onclick="new Particle(8, 8, Math.random() * 200, Math.random() * 300 + 200)" value="1" style="padding: 10px; margin: 5px;" class="btn btn-info">
        <input type="button" onclick="for (let i = 0; i < 10; i++){
            new Particle(8, 8, Math.random() * 200, Math.random() * 300 + 200)
        }" value="10" style="padding: 10px; margin: 5px;" class="btn btn-info">
    
        <input type="button" onclick="for (let i = 0; i < 100; i++){
            new Particle(8, 8, Math.random() * 200, Math.random() * 300 + 200)
        }" value="100" style="padding: 10px; margin: 5px;" class="btn btn-info">
    
        <input type="button" onclick="for (let i = 0; i < 1000; i++){
            new Particle(8, 8, Math.random() * 200, Math.random() * 500 + 100)
        }" value="!!!" style="padding: 10px; margin: 5px;" class="btn btn-danger">
        <script src="vfx.js"></script>
    </body>

</html>
